name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore TimePoker.slnx

      - name: Build (Release)
        run: dotnet build TimePoker.slnx --configuration Release --no-restore

      - name: Test
        run: dotnet test TimePoker.slnx --configuration Release --no-build --verbosity normal
